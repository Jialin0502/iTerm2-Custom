name: Build

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: '构建配置'
        required: true
        type: choice
        options:
          - Deployment
          - Development
          - Beta
          - Nightly
        default: 'Deployment'
      architecture:
        description: '目标架构'
        required: true
        type: choice
        options:
          - universal
          - arm64
          - x86_64
        default: 'universal'

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install Homebrew dependencies
        run: |
          brew install cmake pkg-config automake perl python3
          brew install --cask sf-symbols

      - name: Install Python dependencies
        run: |
          $(brew --prefix)/bin/pip3 install --break-system-packages pyobjc

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin
          cargo install cbindgen

      - name: Cache Pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Cargo Registry & Build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('submodules/railroad_dsl/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Generate Submodule Hashes
        id: submodule-hashes
        run: |
          echo "libsixel=$(git rev-parse HEAD:submodules/libsixel)" >> $GITHUB_OUTPUT
          echo "coreparse=$(git rev-parse HEAD:submodules/CoreParse)" >> $GITHUB_OUTPUT
          echo "libgit2=$(git rev-parse HEAD:submodules/libgit2)" >> $GITHUB_OUTPUT
          echo "sparkle=$(git rev-parse HEAD:submodules/Sparkle)" >> $GITHUB_OUTPUT
          echo "railroad_dsl=$(git rev-parse HEAD:submodules/railroad_dsl)" >> $GITHUB_OUTPUT
          
          # NMSSH 依赖 chain：openssl + libssh2 + NMSSH
          NM_CHAIN=$(git rev-parse HEAD:submodules/openssl HEAD:submodules/libssh2 HEAD:submodules/NMSSH | shasum | awk '{print $1}')
          echo "nm_chain=$NM_CHAIN" >> $GITHUB_OUTPUT

      - name: Cache libsixel
        uses: actions/cache@v4
        with:
          path: ThirdParty/libsixel
          key: ${{ runner.os }}-libsixel-${{ steps.submodule-hashes.outputs.libsixel }}

      - name: Cache CoreParse
        uses: actions/cache@v4
        with:
          path: ThirdParty/CoreParse.framework
          key: ${{ runner.os }}-coreparse-${{ steps.submodule-hashes.outputs.coreparse }}

      - name: Cache NMSSH Chain
        uses: actions/cache@v4
        with:
          path: |
            ThirdParty/NMSSH.framework
            submodules/openssl/build-fat
            submodules/libssh2/build_x86_64
            submodules/libssh2/build_arm64
          key: ${{ runner.os }}-nmssh-${{ steps.submodule-hashes.outputs.nm_chain }}

      - name: Cache libgit2
        uses: actions/cache@v4
        with:
          path: ThirdParty/libgit2
          key: ${{ runner.os }}-libgit2-${{ steps.submodule-hashes.outputs.libgit2 }}

      - name: Cache Sparkle
        uses: actions/cache@v4
        with:
          path: ThirdParty/Sparkle.framework
          key: ${{ runner.os }}-sparkle-${{ steps.submodule-hashes.outputs.sparkle }}

      - name: Cache librailroad_dsl
        uses: actions/cache@v4
        with:
          path: ThirdParty/librailroad_dsl
          key: ${{ runner.os }}-railroad-dsl-${{ steps.submodule-hashes.outputs.railroad_dsl }}

      - name: Download Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain

      - name: Prepare build plist
        run: |
          case "${{ inputs.configuration }}" in
            Development)
              cp plists/dev-iTerm2.plist plists/iTerm2.plist
              ;;
            Beta)
              cp plists/beta-iTerm2.plist plists/iTerm2.plist
              ;;
            Nightly)
              cp plists/nightly-iTerm2.plist plists/iTerm2.plist
              ;;
            Deployment)
              cp plists/release-iTerm2.plist plists/iTerm2.plist
              ;;
          esac

      - name: Build dependencies
        run: |
          source "$HOME/.cargo/env"
          
          if [ ! -f ThirdParty/libsixel/lib/libsixel.a ]; then
            echo "Building libsixel..."
            make fatlibsixel UNIVERSAL=1
          fi
          
          if [ ! -d ThirdParty/CoreParse.framework ]; then
            echo "Building CoreParse..."
            make CoreParse UNIVERSAL=1
          fi
          
          if [ ! -d ThirdParty/NMSSH.framework ]; then
            echo "Building NMSSH chain (includes openssl and libssh2)..."
            make NMSSH UNIVERSAL=1
          fi
          
          if [ ! -f ThirdParty/libgit2/lib/libgit2.a ]; then
            echo "Building libgit2..."
            make libgit2 UNIVERSAL=1
          fi
          
          if [ ! -d ThirdParty/Sparkle.framework ]; then
            echo "Building Sparkle..."
            make sparkle UNIVERSAL=1
          fi
          
          if [ ! -f ThirdParty/librailroad_dsl/lib/librailroad_dsl.dylib ]; then
            echo "Building librailroad_dsl..."
            make librailroad_dsl UNIVERSAL=1
          fi
          
          # 构建剩余的小型/快捷依赖
          echo "Building remaining fast dependencies (sfsymbolenum pwmadapters bindeps)..."
          make sfsymbolenum pwmadapters bindeps UNIVERSAL=1

      - name: Kill orphan Xcode processes
        run: |
          killall ibtoold 2>/dev/null || true
          killall AssetCatalogSimulatorAgent 2>/dev/null || true

      - name: Build iTerm2
        run: |
          source "$HOME/.cargo/env"

          # 确定架构标志
          if [ "${{ inputs.architecture }}" = "universal" ]; then
            ARCH_FLAGS=""
          elif [ "${{ inputs.architecture }}" = "arm64" ]; then
            ARCH_FLAGS="ARCHS=arm64 ONLY_ACTIVE_ARCH=YES"
          else
            ARCH_FLAGS="ARCHS=x86_64 ONLY_ACTIVE_ARCH=YES"
          fi

          CONFIGURATION="${{ inputs.configuration }}"
          EXTRA_FLAGS=""
          if [ "$CONFIGURATION" != "Development" ]; then
            EXTRA_FLAGS="ENABLE_ADDRESS_SANITIZER=NO"
          fi

          # 重试最多 3 次，处理 ibtoold 崩溃
          for attempt in 1 2 3; do
            echo "::group::Attempt $attempt of 3"
            rm -f build_output.txt

            set +e
            xcodebuild \
              -scheme iTerm2 \
              -configuration "$CONFIGURATION" \
              -destination 'platform=macOS' \
              -skipPackagePluginValidation \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              $ARCH_FLAGS \
              $EXTRA_FLAGS 2>&1 | tee build_output.txt
            exit_code=${PIPESTATUS[0]}
            set -e
            echo "::endgroup::"

            if [ $exit_code -eq 0 ]; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            fi

            if grep -q "CompileAssetCatalogVariant failed\|IBPlatformToolFailureException\|The tool closed the connection" build_output.txt; then
              echo "::warning::Attempt $attempt failed due to flaky ibtoold crash (known Xcode 26.2 issue)"
              if [ $attempt -lt 3 ]; then
                echo "Retrying..."
                killall ibtoold 2>/dev/null || true
                killall AssetCatalogSimulatorAgent 2>/dev/null || true
                sleep 5
                continue
              else
                echo "::error::All 3 attempts failed due to flaky ibtoold crashes"
                exit 1
              fi
            else
              echo "::error::Build failed (not a flaky ibtoold issue)"
              exit 1
            fi
          done

      - name: Package build artifact
        if: success()
        run: |
          BUILD_DIR=$(xcodebuild -scheme iTerm2 -showBuildSettings 2>/dev/null | awk -F ' = ' '/^ *SYMROOT/{print $2; exit}')
          CONFIGURATION="${{ inputs.configuration }}"
          APP_PATH="$BUILD_DIR/$CONFIGURATION/iTerm2.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "::error::iTerm2.app not found at $APP_PATH"
            exit 1
          fi

          mkdir -p artifact
          cd "$BUILD_DIR/$CONFIGURATION"
          zip -r -y "$GITHUB_WORKSPACE/artifact/iTerm2-$CONFIGURATION-${{ inputs.architecture }}.zip" iTerm2.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: iTerm2-${{ inputs.configuration }}-${{ inputs.architecture }}
          path: artifact/*.zip
